  { id: 'demo5', type: 'expense', name: 'Vercel Hosting', amount: 950, category: 'Hosting', date: '2024-03-01', paymentMethod: 'فيزا', notes: 'شهري' },
  { id: 'demo6', type: 'expense', name: 'ChatGPT Plus', amount: 950, category: 'AI Subscriptions', date: '2024-04-01', paymentMethod: 'فيزا', notes: 'شهري' },
  { id: 'demo7', type: 'expense', name: 'إنترنت فايبر WE', amount: 600, category: 'إنترنت', date: '2024-05-01', paymentMethod: 'تحويل بنكي', notes: 'شهري' },
  { id: 'demo8', type: 'expense', name: 'كورس React متقدم', amount: 3500, category: 'كورسات تعليمية', date: '2024-03-15', paymentMethod: 'تحويل بنكي', notes: 'Udemy' },
  { id: 'demo9', type: 'expense', name: 'شاشة خارجية 4K', amount: 8500, category: 'لابتوب وهاردوير', date: '2024-06-01', paymentMethod: 'فيزا', notes: 'Dell 27"' },
  { id: 'demo10', type: 'expense', name: 'Facebook Ads', amount: 2000, category: 'Marketing', date: '2024-07-01', paymentMethod: 'فيزا', notes: 'حملة تجريبية' },
  { id: 'demo11', type: 'revenue', name: 'أول مشروع - MVP', amount: 25000, client: 'شركة أكيومن', date: '2024-04-20', notes: 'تطوير' },
  { id: 'demo12', type: 'revenue', name: 'SaaS Subscription', amount: 5000, client: 'TechStart مصر', date: '2024-06-15', notes: 'MRR' },
  { id: 'demo13', type: 'revenue', name: 'استشارة تقنية', amount: 8000, client: 'StartupX', date: '2024-08-01', notes: 'جلسة استشارية' },
  { id: 'demo14', type: 'expense', name: 'كيبورد ميكانيكال', amount: 2800, category: 'لابتوب وهاردوير', date: '2024-08-10', paymentMethod: 'كاش', notes: 'Keychron' },
];

function getTransactions() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; }
}
function saveTransactions(tx) { localStorage.setItem(STORAGE_KEY, JSON.stringify(tx)); }
function getSettings() {
  try { const s = localStorage.getItem(SETTINGS_KEY); return s ? JSON.parse(s) : { darkMode: true }; } catch(e) { return { darkMode: true }; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function formatCurrency(n) { return Math.round(n).toLocaleString('ar-EG') + ' ج.م'; }

function formatDate(d) {
  const date = new Date(d);
  const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
  return date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
}

function getMonthLabel(d) {
  const date = new Date(d);
  const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
  return months[date.getMonth()];
}

function getRelativeTime(d) {
  const now = new Date();
  const date = new Date(d);
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return 'اليوم';
  if (diffDays === 1) return 'أمس';
  if (diffDays < 7) return 'منذ ' + diffDays + ' أيام';
  if (diffDays < 30) return 'منذ ' + Math.floor(diffDays / 7) + ' أسابيع';
  return formatDate(d);
}

function generateId() { return 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

// ========== STATE ==========
let currentPage = 'dashboard';
let transactions = [];
let toastMessage = null;
let toastTimeout = null;
let darkMode = true;

function init() {
  transactions = getTransactions();
  if (transactions.length === 0) {
    transactions = [...DEMO_DATA];
    saveTransactions(transactions);
  }
  darkMode = getSettings().darkMode;
  applyTheme();
  renderApp();
}

function applyTheme() {
  if (darkMode) document.body.classList.remove('light-mode');
  else document.body.classList.add('light-mode');
}

function showToast(msg) {
  toastMessage = msg;
  renderApp();
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { toastMessage = null; renderApp(); }, 2500);
}

function navigateTo(page) { currentPage = page; renderApp(); window.scrollTo(0, 0); }

// ========== BUSINESS LOGIC ==========
function getStats() {
  const expenses = transactions.filter(t => t.type === 'expense');
  const revenues = transactions.filter(t => t.type === 'revenue');
  const totalExp = expenses.reduce((s, t) => s + t.amount, 0);
  const totalRev = revenues.reduce((s, t) => s + t.amount, 0);
  return { totalExp, totalRev, net: totalRev - totalExp, count: transactions.length };
}

function getInsights() {
  const expenses = transactions.filter(t => t.type === 'expense');
  const revenues = transactions.filter(t => t.type === 'revenue');
  const totalExp = expenses.reduce((s,t) => s + t.amount, 0);
  const totalRev = revenues.reduce((s,t) => s + t.amount, 0);
  const aiSpend = expenses.filter(t => ['Claude','ChatGPT','Cursor','Kimi','AI Subscriptions'].includes(t.category)).reduce((s,t) => s + t.amount, 0);
  const months = new Set(expenses.map(t => getMonthLabel(t.date)));
  const burnRate = months.size > 0 ? totalExp / months.size : 0;
  const breakEven = totalExp > 0 ? Math.round((totalRev / totalExp) * 100) : 0;
  const largestCat = getCategoryData()[0];
  
  return [
    `🤖 AI tools = ${totalExp > 0 ? Math.round((aiSpend / totalExp) * 100) : 0}% من إجمالي المصروفات`,
    `🔥 <span class="en-term">Burn Rate</span> شهري: ${formatCurrency(burnRate)}`,
    `🎯 <span class="en-term">Break-even</span>: ${breakEven}%`,
    largestCat ? `📌 أكبر فئة: "${largestCat.name}" (${formatCurrency(largestCat.value)})` : '',
  ].filter(Boolean);
}

function getMonthlyData() {
  const map = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    const month = getMonthLabel(t.date);
    map[month] = (map[month] || 0) + t.amount;
  });
  return Object.entries(map).map(([name, amount]) => ({ name, amount }));
}

function getCategoryData() {
  const map = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    map[t.category] = (map[t.category] || 0) + t.amount;
  });
  return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value);
}

function addTransaction(data) {
  const newTx = { ...data, id: generateId(), createdAt: new Date().toISOString() };
  transactions.unshift(newTx);
  saveTransactions(transactions);
  showToast('✅ تم حفظ المعاملة بنجاح');
  renderApp();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveTransactions(transactions);
  showToast('🗑 تم حذف المعاملة');
  renderApp();
}

function exportData() {
  const data = { transactions, exportDate: new Date().toISOString(), version: '2.0', currency: 'EGP' };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ms-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 تم تصدير النسخة الاحتياطية');
}

function importData(jsonData) {
  if (jsonData.transactions && Array.isArray(jsonData.transactions)) {
    transactions = jsonData.transactions;
    saveTransactions(transactions);
    showToast('📤 تم استعادة البيانات');
    renderApp();
  } else { alert('ملف غير صالح'); }
}

function clearAllData() {
  if (confirm('⚠️ حذف جميع البيانات؟ لا يمكن التراجع.')) {
    transactions = [];
    saveTransactions(transactions);
    showToast('🗑 تم حذف جميع البيانات');
    renderApp();
  }
}

function loadDemoData() {
  transactions = [...DEMO_DATA];
  saveTransactions(transactions);
  showToast('📦 تم تحميل البيانات التجريبية');
  renderApp();
}

function toggleTheme() {
  darkMode = !darkMode;
  saveSettings({ darkMode });
  applyTheme();
  renderApp();
}

// ========== RENDER ==========
function renderHeader() {
  const pageLabels = {
    'dashboard': 'Dashboard',
    'transactions': 'Transactions',
    'timeline': 'Timeline',
    'settings': 'Settings'
  };
  return `
    <div class="fixed-header">
      <div class="header-top">
        <div class="header-brand">
          <div class="header-title">Market Systems</div>
          <div class="header-subtitle">INVESTMENT TRACKER</div>
        </div>
        <div class="header-page-label">${pageLabels[currentPage] || ''}</div>
      </div>
    </div>
  `;
}

function renderApp() {
  const root = document.getElementById('app-root');
  if (!root) { setTimeout(renderApp, 100); return; }
  
  root.innerHTML = `
    ${renderHeader()}
    ${renderPage()}
    ${renderBottomNav()}
    ${currentPage !== 'settings' ? renderFAB() : ''}
    ${toastMessage ? `<div class="toast">${toastMessage}</div>` : ''}
  `;
  
  bindEvents();
}

function renderPage() {
  switch(currentPage) {
    case 'dashboard': return renderDashboard();
    case 'transactions': return renderTransactionsPage();
    case 'timeline': return renderTimelinePage();
    case 'settings': return renderSettingsPage();
    default: return renderDashboard();
  }
}
