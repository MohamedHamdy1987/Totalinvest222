<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Market Systems Investment Tracker</title>

  <!-- PWA -->
  <meta name="theme-color" content="#0f172a"/>
  <link rel="manifest" href="data:application/manifest+json,{
    &quot;name&quot;:&quot;Market Systems Investment Tracker&quot;,
    &quot;short_name&quot;:&quot;MS Tracker&quot;,
    &quot;display&quot;:&quot;standalone&quot;,
    &quot;background_color&quot;:&quot;#0f172a&quot;,
    &quot;theme_color&quot;:&quot;#0f172a&quot;,
    &quot;start_url&quot;:&quot;.&quot;
  }">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      background: #020617;
      color: white;
      overflow-x: hidden;
    }

    .glass{
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card{
      border-radius: 24px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.03)
      );
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
      0 10px 30px rgba(0,0,0,0.25);
    }

    .gradient-text{
      background: linear-gradient(to right,#60a5fa,#34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-btn.active{
      color: #60a5fa;
    }

    .fab{
      position: fixed;
      bottom: 90px;
      right: 22px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg,#3b82f6,#10b981);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 22px;
      box-shadow: 0 10px 30px rgba(59,130,246,0.4);
      z-index: 999;
      transition: .25s;
    }

    .fab:active{
      transform: scale(.95);
    }

    .bottom-nav{
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 74px;
      background: rgba(15,23,42,.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.06);
      z-index: 998;
    }

    .page{
      display:none;
      animation: fade .3s ease;
    }

    .page.active{
      display:block;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform: translateY(10px);
      }
      to{
        opacity:1;
        transform: translateY(0);
      }
    }

    .toast{
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 18px;
      background: #10b981;
      border-radius: 16px;
      z-index: 9999;
      display:none;
      font-weight:600;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    input,select,textarea{
      background: rgba(255,255,255,.05)!important;
      border:1px solid rgba(255,255,255,.08)!important;
      color:white!important;
    }

    input::placeholder,
    textarea::placeholder{
      color:#94a3b8;
    }

    .timeline-line{
      position:absolute;
      left: 14px;
      top: 0;
      bottom:0;
      width:2px;
      background: rgba(255,255,255,.1);
    }

    .timeline-dot{
      width: 14px;
      height: 14px;
      background:#3b82f6;
      border-radius:50%;
      position:absolute;
      left:8px;
      top:10px;
      box-shadow:0 0 15px #3b82f6;
    }

    .light-mode{
      background:#f8fafc!important;
      color:#0f172a!important;
    }

    .light-mode .card,
    .light-mode .glass{
      background: rgba(255,255,255,.85)!important;
      color:#0f172a!important;
      border:1px solid rgba(15,23,42,.08)!important;
    }

    .light-mode input,
    .light-mode select,
    .light-mode textarea{
      color:#0f172a!important;
      background:#fff!important;
    }

    .light-mode .bottom-nav{
      background: rgba(255,255,255,.92);
    }

    .light-mode .nav-btn{
      color:#334155;
    }

  </style>
</head>

<body class="pb-28">

<div id="toast" class="toast"></div>

<!-- FAB -->
<button class="fab" onclick="openQuickAdd()">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- APP -->
<div class="max-w-md mx-auto px-4 py-5">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-extrabold gradient-text">
        Market Systems
      </h1>
      <p class="text-slate-400 text-sm">
        Founder Investment Tracker
      </p>
    </div>

    <button onclick="toggleTheme()" class="glass p-3 rounded-2xl">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <!-- DASHBOARD -->
  <section id="dashboard" class="page active">

    <div class="grid grid-cols-2 gap-4">

      <div class="card p-4">
        <p class="text-slate-400 text-sm">Expenses</p>
        <h2 id="totalExpenses" class="text-2xl font-bold mt-2">$0</h2>
      </div>

      <div class="card p-4">
        <p class="text-slate-400 text-sm">Revenue</p>
        <h2 id="totalRevenue" class="text-2xl font-bold mt-2 text-green-400">$0</h2>
      </div>

      <div class="card p-4">
        <p class="text-slate-400 text-sm">Profit/Loss</p>
        <h2 id="profitLoss" class="text-2xl font-bold mt-2">$0</h2>
      </div>

      <div class="card p-4">
        <p class="text-slate-400 text-sm">Transactions</p>
        <h2 id="transactionCount" class="text-2xl font-bold mt-2">0</h2>
      </div>

    </div>

    <!-- CHART -->
    <div class="card p-4 mt-5">
      <div class="flex justify-between mb-4">
        <h3 class="font-bold">Monthly Spending</h3>
      </div>

      <canvas id="spendingChart" height="180"></canvas>
    </div>

    <!-- INSIGHTS -->
    <div class="mt-5">
      <h3 class="font-bold text-lg mb-3">Founder Insights</h3>

      <div id="insightsContainer" class="space-y-3"></div>
    </div>

    <!-- RECENT -->
    <div class="mt-5">
      <h3 class="font-bold text-lg mb-3">Recent Activity</h3>

      <div id="recentTransactions" class="space-y-3"></div>
    </div>

  </section>

  <!-- ADD EXPENSE -->
  <section id="addExpense" class="page">

    <div class="card p-5">

      <h2 class="text-xl font-bold mb-5">
        Add Expense
      </h2>

      <div class="space-y-4">

        <input id="expenseName"
          class="w-full p-4 rounded-2xl"
          placeholder="Expense Name">

        <input id="expenseAmount"
          type="number"
          class="w-full p-4 rounded-2xl"
          placeholder="Amount">

        <select id="expenseCategory"
          class="w-full p-4 rounded-2xl">
        </select>

        <input id="expenseMethod"
          class="w-full p-4 rounded-2xl"
          placeholder="Payment Method">

        <input id="expenseDate"
          type="date"
          class="w-full p-4 rounded-2xl">

        <textarea id="expenseNotes"
          rows="4"
          class="w-full p-4 rounded-2xl"
          placeholder="Notes"></textarea>

        <button onclick="saveExpense()"
          class="w-full p-4 rounded-2xl bg-blue-500 font-bold">
          Save Expense
        </button>

      </div>

    </div>

  </section>

  <!-- TRANSACTIONS -->
  <section id="transactions" class="page">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Transactions</h2>
    </div>

    <input
      id="searchInput"
      oninput="renderTransactions()"
      class="w-full p-4 rounded-2xl mb-4"
      placeholder="Search transactions...">

    <div id="transactionsList" class="space-y-3"></div>

  </section>

  <!-- REVENUE -->
  <section id="revenue" class="page">

    <div class="card p-5">

      <h2 class="text-xl font-bold mb-5">
        Add Revenue
      </h2>

      <div class="space-y-4">

        <input id="revenueName"
          class="w-full p-4 rounded-2xl"
          placeholder="Revenue Name">

        <input id="revenueAmount"
          type="number"
          class="w-full p-4 rounded-2xl"
          placeholder="Amount">

        <input id="revenueClient"
          class="w-full p-4 rounded-2xl"
          placeholder="Client">

        <input id="revenueDate"
          type="date"
          class="w-full p-4 rounded-2xl">

        <textarea id="revenueNotes"
          rows="4"
          class="w-full p-4 rounded-2xl"
          placeholder="Notes"></textarea>

        <button onclick="saveRevenue()"
          class="w-full p-4 rounded-2xl bg-green-500 font-bold">
          Save Revenue
        </button>

      </div>

    </div>

  </section>

  <!-- TIMELINE -->
  <section id="timeline" class="page">

    <h2 class="text-xl font-bold mb-5">
      Founder Journey Timeline
    </h2>

    <div id="timelineContainer" class="relative pl-10 space-y-5">
      <div class="timeline-line"></div>
    </div>

  </section>

  <!-- SETTINGS -->
  <section id="settings" class="page">

    <div class="space-y-4">

      <div class="card p-5">
        <h3 class="font-bold mb-3">Theme</h3>

        <button onclick="toggleTheme()"
          class="w-full p-4 rounded-2xl bg-slate-700">
          Toggle Dark / Light
        </button>
      </div>

      <div class="card p-5">
        <h3 class="font-bold mb-3">Export Data</h3>

        <button onclick="exportData()"
          class="w-full p-4 rounded-2xl bg-blue-500">
          Export Backup JSON
        </button>
      </div>

      <div class="card p-5">
        <h3 class="font-bold mb-3">Reset App</h3>

        <button onclick="resetData()"
          class="w-full p-4 rounded-2xl bg-red-500">
          Reset All Data
        </button>
      </div>

    </div>

  </section>

</div>

<!-- NAV -->
<div class="bottom-nav flex justify-around items-center">

  <button class="nav-btn active flex flex-col items-center"
    onclick="switchPage('dashboard',this)">
    <i class="fa-solid fa-chart-line text-lg"></i>
    <span class="text-xs mt-1">Home</span>
  </button>

  <button class="nav-btn flex flex-col items-center"
    onclick="switchPage('transactions',this)">
    <i class="fa-solid fa-wallet text-lg"></i>
    <span class="text-xs mt-1">Transactions</span>
  </button>

  <button class="nav-btn flex flex-col items-center"
    onclick="switchPage('addExpense',this)">
    <i class="fa-solid fa-plus text-lg"></i>
    <span class="text-xs mt-1">Expense</span>
  </button>

  <button class="nav-btn flex flex-col items-center"
    onclick="switchPage('revenue',this)">
    <i class="fa-solid fa-money-bill-trend-up text-lg"></i>
    <span class="text-xs mt-1">Revenue</span>
  </button>

  <button class="nav-btn flex flex-col items-center"
    onclick="switchPage('timeline',this)">
    <i class="fa-solid fa-clock-rotate-left text-lg"></i>
    <span class="text-xs mt-1">Timeline</span>
  </button>

  <button class="nav-btn flex flex-col items-center"
    onclick="switchPage('settings',this)">
    <i class="fa-solid fa-gear text-lg"></i>
    <span class="text-xs mt-1">Settings</span>
  </button>

</div>

<script>

const defaultCategories = [
  "Laptop & Hardware",
  "AI Subscriptions",
  "Claude",
  "ChatGPT",
  "Cursor",
  "Kimi",
  "Hosting",
  "Domains",
  "Internet",
  "Learning Courses",
  "Marketing",
  "Transportation",
  "Team",
  "Miscellaneous"
];

let expenses = JSON.parse(localStorage.getItem("expenses")) || [
  {
    id:1,
    name:"MacBook Pro",
    amount:2200,
    category:"Laptop & Hardware",
    method:"Visa",
    date:"2026-05-01",
    notes:"Main development machine"
  },
  {
    id:2,
    name:"Claude Subscription",
    amount:20,
    category:"Claude",
    method:"Card",
    date:"2026-05-02",
    notes:"AI coding assistant"
  },
  {
    id:3,
    name:"Cursor AI",
    amount:20,
    category:"Cursor",
    method:"Card",
    date:"2026-05-03",
    notes:"Development IDE"
  }
];

let revenues = JSON.parse(localStorage.getItem("revenues")) || [
  {
    id:1,
    name:"First Client Payment",
    amount:1500,
    client:"Startup Client",
    date:"2026-05-04",
    notes:"MVP development"
  }
];

function saveStorage(){
  localStorage.setItem("expenses",JSON.stringify(expenses));
  localStorage.setItem("revenues",JSON.stringify(revenues));
}

function switchPage(id,btn){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.remove("active");
  });

  btn.classList.add("active");
}

function populateCategories(){

  const select = document.getElementById("expenseCategory");

  select.innerHTML = "";

  defaultCategories.forEach(cat=>{
    select.innerHTML += `
      <option value="${cat}">
        ${cat}
      </option>
    `;
  });
}

function saveExpense(){

  const name = expenseName.value.trim();
  const amount = Number(expenseAmount.value);
  const category = expenseCategory.value;
  const method = expenseMethod.value;
  const date = expenseDate.value;
  const notes = expenseNotes.value;

  if(!name || !amount){
    showToast("Please fill required fields");
    return;
  }

  expenses.unshift({
    id:Date.now(),
    name,
    amount,
    category,
    method,
    date,
    notes
  });

  saveStorage();

  renderAll();

  expenseName.value="";
  expenseAmount.value="";
  expenseMethod.value="";
  expenseDate.value="";
  expenseNotes.value="";

  showToast("Expense Added");
}

function saveRevenue(){

  const name = revenueName.value.trim();
  const amount = Number(revenueAmount.value);
  const client = revenueClient.value;
  const date = revenueDate.value;
  const notes = revenueNotes.value;

  if(!name || !amount){
    showToast("Please fill required fields");
    return;
  }

  revenues.unshift({
    id:Date.now(),
    name,
    amount,
    client,
    date,
    notes
  });

  saveStorage();

  renderAll();

  revenueName.value="";
  revenueAmount.value="";
  revenueClient.value="";
  revenueDate.value="";
  revenueNotes.value="";

  showToast("Revenue Added");
}

function renderDashboard(){

  const totalExpensesValue = expenses.reduce((a,b)=>a+b.amount,0);

  const totalRevenueValue = revenues.reduce((a,b)=>a+b.amount,0);

  const profit = totalRevenueValue-totalExpensesValue;

  totalExpenses.innerText = "$"+totalExpensesValue.toLocaleString();

  totalRevenue.innerText = "$"+totalRevenueValue.toLocaleString();

  profitLoss.innerText = "$"+profit.toLocaleString();

  transactionCount.innerText =
    expenses.length + revenues.length;

  renderInsights();
  renderRecent();
  renderChart();
}

function renderInsights(){

  const totalExpensesValue =
    expenses.reduce((a,b)=>a+b.amount,0);

  const topCategory = getTopCategory();

  const monthlyBurn =
    Math.round(totalExpensesValue / 12);

  insightsContainer.innerHTML = `
  
    <div class="card p-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-blue-500/20 flex items-center justify-center">
          <i class="fa-solid fa-brain text-blue-400"></i>
        </div>

        <div>
          <h4 class="font-semibold">
            ${topCategory} is your largest investment category.
          </h4>
          <p class="text-slate-400 text-sm">
            Focused founder spending detected.
          </p>
        </div>
      </div>
    </div>

    <div class="card p-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-green-500/20 flex items-center justify-center">
          <i class="fa-solid fa-chart-line text-green-400"></i>
        </div>

        <div>
          <h4 class="font-semibold">
            Estimated monthly burn rate: $${monthlyBurn}
          </h4>
          <p class="text-slate-400 text-sm">
            Keep building consistently.
          </p>
        </div>
      </div>
    </div>
  `;
}

function getTopCategory(){

  const map = {};

  expenses.forEach(e=>{
    map[e.category]=(map[e.category]||0)+e.amount;
  });

  return Object.keys(map).sort((a,b)=>map[b]-map[a])[0];
}

function renderRecent(){

  recentTransactions.innerHTML="";

  expenses.slice(0,5).forEach(e=>{

    recentTransactions.innerHTML += `
      <div class="card p-4 flex justify-between items-center">

        <div>
          <h4 class="font-semibold">${e.name}</h4>
          <p class="text-slate-400 text-sm">${e.category}</p>
        </div>

        <div class="text-right">
          <h4 class="font-bold text-red-400">
            -$${e.amount}
          </h4>

          <p class="text-slate-400 text-xs">
            ${e.date}
          </p>
        </div>

      </div>
    `;
  });
}

function renderTransactions(){

  const search =
    searchInput.value.toLowerCase();

  transactionsList.innerHTML="";

  expenses
  .filter(e=>e.name.toLowerCase().includes(search))
  .forEach(e=>{

    transactionsList.innerHTML += `
    
      <div class="card p-4">

        <div class="flex justify-between">

          <div>
            <h3 class="font-semibold">
              ${e.name}
            </h3>

            <p class="text-slate-400 text-sm">
              ${e.category}
            </p>
          </div>

          <div class="text-right">

            <h3 class="font-bold text-red-400">
              -$${e.amount}
            </h3>

            <p class="text-slate-400 text-xs">
              ${e.date}
            </p>

          </div>

        </div>

      </div>
    `;
  });
}

function renderTimeline(){

  timelineContainer.innerHTML =
    `<div class="timeline-line"></div>`;

  const events = [
    ...expenses.map(e=>({
      title:e.name,
      date:e.date,
      type:"expense"
    })),
    ...revenues.map(r=>({
      title:r.name,
      date:r.date,
      type:"revenue"
    }))
  ];

  events.sort((a,b)=>
    new Date(a.date)-new Date(b.date)
  );

  events.forEach(event=>{

    timelineContainer.innerHTML += `
    
      <div class="relative">

        <div class="timeline-dot"></div>

        <div class="card p-4 ml-4">

          <div class="flex justify-between items-center">

            <div>
              <h3 class="font-semibold">
                ${event.title}
              </h3>

              <p class="text-slate-400 text-sm">
                ${event.type}
              </p>
            </div>

            <p class="text-slate-400 text-sm">
              ${event.date}
            </p>

          </div>

        </div>

      </div>
    `;
  });
}

let chart;

function renderChart(){

  const ctx =
    document.getElementById("spendingChart");

  const monthly = [120,300,220,500,200,350];

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:[
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun'
      ],
      datasets:[{
        label:'Spending',
        data:monthly,
        tension:.4,
        borderColor:'#3b82f6',
        fill:true,
        backgroundColor:'rgba(59,130,246,.1)'
      }]
    },
    options:{
      plugins:{
        legend:{
          labels:{
            color:'#94a3b8'
          }
        }
      },
      scales:{
        x:{
          ticks:{ color:'#94a3b8' }
        },
        y:{
          ticks:{ color:'#94a3b8' }
        }
      }
    }
  });
}

function toggleTheme(){

  document.body.classList.toggle("light-mode");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("light-mode")
  );
}

function loadTheme(){

  const theme =
    localStorage.getItem("theme");

  if(theme==="true"){
    document.body.classList.add("light-mode");
  }
}

function exportData(){

  const data = {
    expenses,
    revenues
  };

  const blob = new Blob(
    [JSON.stringify(data,null,2)],
    {type:"application/json"}
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download =
    "market-systems-backup.json";

  a.click();

  showToast("Backup Exported");
}

function resetData(){

  if(confirm("Reset all data?")){

    expenses = [];
    revenues = [];

    saveStorage();

    renderAll();

    showToast("Data Reset");
  }
}

function showToast(message){

  const toast =
    document.getElementById("toast");

  toast.innerText = message;

  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display="none";
  },2500);
}

function openQuickAdd(){

  switchPage(
    'addExpense',
    document.querySelectorAll('.nav-btn')[2]
  );
}

function renderAll(){

  renderDashboard();

  renderTransactions();

  renderTimeline();
}

populateCategories();
loadTheme();
renderAll();

if('serviceWorker' in navigator){

  const sw = `
  
    self.addEventListener('install',e=>{
      self.skipWaiting();
    });

    self.addEventListener('fetch',e=>{});
  
  `;

  const blob = new Blob([sw],{
    type:'application/javascript'
  });

  const swURL =
    URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL);
}

</script>

</body>
  </html>
