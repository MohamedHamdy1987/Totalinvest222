<script>
// ========== STORAGE (LocalStorage) ==========
const STORAGE_KEY = 'ms_transactions_egp';

// بيانات تجريبية بالجنيه المصري (أسعار مصرية واقعية)

  { id: 'demo10', type: 'expense', name: 'إعلانات فيسبوك', amount: 2000, category: 'تسويق', date: '2024-07-01', paymentMethod: 'فيزا', notes: 'حملة تجريبية' },
  { id: 'demo11', type: 'revenue', name: 'أول مشروع عميل', amount: 25000, client: 'شركة أكيومن', date: '2024-04-20', notes: 'تطوير MVP' },
  { id: 'demo12', type: 'revenue', name: 'اشتراك SaaS شهري', amount: 5000, client: 'TechStart مصر', date: '2024-06-15', notes: 'عميل متكرر' },
  { id: 'demo13', type: 'revenue', name: 'استشارة تقنية', amount: 8000, client: 'StartupX', date: '2024-08-01', notes: 'جلسة استشارية' },
  { id: 'demo14', type: 'expense', name: 'كيبورد ميكانيكال', amount: 2800, category: 'لابتوب وهاردوير', date: '2024-08-10', paymentMethod: 'كاش', notes: 'Keychron' },
];

// Simple storage functions
function getTransactions() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) {
    return [];
  }
}

function saveTransactions(transactions) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

function getCategories() {
  try {
    const cats = localStorage.getItem(CATEGORIES_KEY);
    return cats ? JSON.parse(cats) : DEFAULT_CATEGORIES;
  } catch(e) {
    return DEFAULT_CATEGORIES;
  }
}

function getSettings() {
  try {
    const s = localStorage.getItem(SETTINGS_KEY);
    return s ? JSON.parse(s) : { darkMode: true };
  } catch(e) {
    return { darkMode: true };
  }
}

function saveSettings(settings) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

// ========== HELPERS (بالجنيه المصري) ==========
function formatCurrency(n) {
  return Math.round(n).toLocaleString('ar-EG') + ' ج.م';
}

function formatDate(d) {
  const date = new Date(d);
  const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
  return date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
}

function getMonthLabel(d) {
  const date = new Date(d);
  const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
  return months[date.getMonth()] + ' ' + String(date.getFullYear()).slice(2);
}

function generateId() {
  return 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

function getRelativeTime(d) {
  const now = new Date();
  const date = new Date(d);
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return 'اليوم';
  if (diffDays === 1) return 'أمس';
  if (diffDays < 7) return 'منذ ' + diffDays + ' أيام';
  if (diffDays < 30) return 'منذ ' + Math.floor(diffDays / 7) + ' أسابيع';
  return formatDate(d);
}

// ========== APP STATE ==========
let currentPage = 'dashboard';
let transactions = [];
let toastMessage = null;
let toastTimeout = null;
let darkMode = true;

// Initialize
function init() {
  transactions = getTransactions();
  if (transactions.length === 0) {
    transactions = DEMO_DATA;
    saveTransactions(transactions);
  }
  darkMode = getSettings().darkMode;
  applyTheme();
  renderApp();
}

function applyTheme() {
  if (darkMode) {
    document.body.classList.remove('light-mode');
  } else {
    document.body.classList.add('light-mode');
  }
}

function showToast(msg) {
  toastMessage = msg;
  renderApp();
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toastMessage = null;
    renderApp();
  }, 2500);
}

function navigateTo(page) {
  currentPage = page;
  renderApp();
  window.scrollTo(0, 0);
}

// ========== BUSINESS LOGIC ==========
function getStats() {
  const expenses = transactions.filter(t => t.type === 'expense');
  const revenues = transactions.filter(t => t.type === 'revenue');
  const totalExp = expenses.reduce((s, t) => s + t.amount, 0);
  const totalRev = revenues.reduce((s, t) => s + t.amount, 0);
  return { totalExp, totalRev, net: totalRev - totalExp, count: transactions.length };
}

function getInsights() {
  const expenses = transactions.filter(t => t.type === 'expense');
  const revenues = transactions.filter(t => t.type === 'revenue');
  const totalExp = expenses.reduce((s,t) => s + t.amount, 0);
  const totalRev = revenues.reduce((s,t) => s + t.amount, 0);
  const aiCats = ['Claude','ChatGPT','Cursor','Kimi'];
  const aiSpend = expenses.filter(t => aiCats.includes(t.category)).reduce((s,t) => s + t.amount, 0);
  const months = new Set(expenses.map(t => getMonthLabel(t.date)));
  const burnRate = months.size > 0 ? totalExp / months.size : 0;
  const breakEven = totalExp > 0 ? Math.round((totalRev / totalExp) * 100) : 0;
  
  const largestCat = getCategoryData()[0];
  
  return [
    `🤖 أدوات الذكاء الاصطناعي = ${totalExp > 0 ? Math.round((aiSpend / totalExp) * 100) : 0}% من إجمالي المصروفات`,
    `🔥 معدل الحرق الشهري: ${formatCurrency(burnRate)}`,
    `🎯 نسبة الوصول لنقطة التعادل: ${breakEven}%`,
    largestCat ? `📌 أكبر فئة إنفاق: "${largestCat.name}" (${formatCurrency(largestCat.value)})` : '',
  ].filter(Boolean);
}

function getMonthlyData() {
  const map = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    const month = getMonthLabel(t.date);
    map[month] = (map[month] || 0) + t.amount;
  });
  const entries = Object.entries(map).map(([name, amount]) => ({ name, amount }));
  entries.sort((a,b) => {
    const [mA, yA] = a.name.split(' ');
    const [mB, yB] = b.name.split(' ');
    const months = ['يناير', 'فبراير', 'مارس', 'إبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    if (yA !== yB) return parseInt(yA) - parseInt(yB);
    return months.indexOf(mA) - months.indexOf(mB);
  });
  return entries;
}

function getCategoryData() {
  const map = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    map[t.category] = (map[t.category] || 0) + t.amount;
  });
  return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value);
}

function addTransaction(data) {
  const newTx = { ...data, id: generateId(), createdAt: new Date().toISOString() };
  transactions.unshift(newTx);
  saveTransactions(transactions);
  showToast('✅ تم حفظ المعاملة بنجاح');
  renderApp();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveTransactions(transactions);
  showToast('🗑 تم حذف المعاملة');
  renderApp();
}

function exportData() {
  const data = { transactions, exportDate: new Date().toISOString(), version: '2.0', currency: 'EGP' };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `market-systems-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 تم تحميل النسخة الاحتياطية');
}

function importData(jsonData) {
  if (jsonData.transactions && Array.isArray(jsonData.transactions)) {
    transactions = jsonData.transactions;
    saveTransactions(transactions);
    showToast('📤 تم استعادة البيانات بنجاح');
    renderApp();
  } else {
    alert('❌ ملف النسخة الاحتياطية غير صالح');
  }
}

function clearAllData() {
  if (confirm('⚠️ هل أنت متأكد من حذف جميع البيانات؟ لا يمكن التراجع عن هذا الإجراء.')) {
    transactions = [];
    saveTransactions(transactions);
    showToast('🗑 تم حذف جميع البيانات');
    renderApp();
  }
}

function loadDemoData() {
  transactions = [...DEMO_DATA];
  saveTransactions(transactions);
  showToast('📦 تم تحميل البيانات التجريبية');
  renderApp();
}

function toggleTheme() {
  darkMode = !darkMode;
  saveSettings({ darkMode });
  applyTheme();
  renderApp();
}

// ========== RENDER FUNCTIONS ==========
function renderApp() {
  const root = document.getElementById('app-root');
  if (!root) {
    setTimeout(renderApp, 100);
    return;
  }
  
  root.innerHTML = `
    ${renderPage()}
    ${renderBottomNav()}
    ${currentPage !== 'settings' ? renderFAB() : ''}
    ${toastMessage ? `<div class="toast">${toastMessage}</div>` : ''}
  `;
  
  bindEvents();
}

function renderPage() {
  switch(currentPage) {
    case 'dashboard': return renderDashboard();
    case 'transactions': return renderTransactionsPage();
    case 'timeline': return renderTimelinePage();
    case 'settings': return renderSettingsPage();
    default: return renderDashboard();
  }
}

function renderDashboard() {
  const stats = getStats();
  const insights = getInsights();
  const monthlyData = getMonthlyData();
  const categoryData = getCategoryData();
  const maxMonthly = Math.max(...monthlyData.map(d => d.amount), 1);
  const COLORS = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16', '#F97316', '#6366F1'];
  
  let barsHTML = '';
  if (monthlyData.length > 0) {
    barsHTML = monthlyData.map(d => {
      const h = Math.max((d.amount / maxMonthly) * 160, 8);
      return `
        <div class="bar-wrapper">
          <div class="bar" style="height:${h}px"></div>
          <div class="bar-label">${d.name}</div>
        </div>
      `;
    }).join('');
  }
  
  let legendHTML = '';
  let totalCat = categoryData.reduce((s, d) => s + d.value, 0);
  if (categoryData.length > 0 && totalCat > 0) {
    legendHTML = categoryData.slice(0, 8).map((d, i) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${COLORS[i]}"></div>
        <span>${d.name} (${Math.round(d.value/totalCat*100)}%)</span>
      </div>
    `).join('');
  }
  
  return `
    <div class="page active" id="page-dashboard">
      <h1>📊 لوحة التحكم</h1>
      
      <div class="metrics-grid">
        <div class="card">
          <div class="metric-label">إجمالي المصروفات</div>
          <div class="metric-value text-danger">${formatCurrency(stats.totalExp)}</div>
        </div>
        <div class="card">
          <div class="metric-label">إجمالي الإيرادات</div>
          <div class="metric-value text-success">${formatCurrency(stats.totalRev)}</div>
        </div>
        <div class="card">
          <div class="metric-label">صافي الربح / الخسارة</div>
          <div class="metric-value ${stats.net >= 0 ? 'text-success' : 'text-danger'}">${stats.net >= 0 ? '+' : ''}${formatCurrency(stats.net)}</div>
        </div>
        <div class="card">
          <div class="metric-label">عدد المعاملات</div>
          <div class="metric-value">${stats.count}</div>
        </div>
      </div>
      
      ${insights.map((ins, i) => `
        <div class="card glass insight-card">
          <span style="font-size:1.2rem;">💡</span>
          <span>${ins}</span>
        </div>
      `).join('')}
      
      ${monthlyData.length > 0 ? `
        <div class="card">
          <h3>📈 اتجاه الإنفاق الشهري</h3>
          <div class="bar-chart">
            ${barsHTML}
          </div>
        </div>
      ` : ''}
      
      ${categoryData.length > 0 ? `
        <div class="card">
          <h3>🍩 توزيع المصروفات حسب الفئة</h3>
          <div class="legend">${legendHTML}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderTransactionsPage() {
  const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
  
  let rowsHTML = '';
  if (sorted.length === 0) {
    rowsHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <h3>لا توجد معاملات حتى الآن</h3>
        <p>ابدأ بإضافة أول مصروف أو إيراد</p>
      </div>
    `;
  } else {
    rowsHTML = sorted.map(t => `
      <div class="card tx-row" data-id="${t.id}">
        <div>
          <div style="font-weight:700;font-size:0.95rem;">${t.name}</div>
          <div style="font-size:0.7rem;opacity:0.7;">${t.category || (t.type === 'revenue' ? 'إيراد' : 'مصروف')} · ${getRelativeTime(t.date)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-weight:800;font-size:0.95rem;color:${t.type === 'expense' ? '#EF4444' : '#10B981'}">
            ${t.type === 'expense' ? '-' : '+'}${formatCurrency(t.amount)}
          </span>
          <button class="btn-delete" data-id="${t.id}" style="background:none;color:#EF4444;font-size:1.1rem;padding:4px 8px;border-radius:8px;opacity:0.7;">🗑</button>
        </div>
      </div>
    `).join('');
  }
  
  return `
    <div class="page active" id="page-transactions">
      <h1>💳 المعاملات</h1>
      <input id="search-tx" placeholder="🔍 بحث في المعاملات..." />
      <div id="tx-list">
        ${rowsHTML}
      </div>
    </div>
  `;
}

function renderTimelinePage() {
  const significant = transactions
    .filter(t => t.amount > 500 || t.name.includes('أول') || t.name.includes('First'))
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  
  let timelineHTML = '';
  if (significant.length === 0) {
    timelineHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <h3>رحلتك تبدأ من هنا</h3>
        <p>كل حدث مهم سيظهر في هذا الجدول الزمني</p>
      </div>
    `;
  } else {
    timelineHTML = significant.map((t, i) => `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="card ${i === 0 ? 'glass' : ''}">
          <div style="font-size:0.7rem;opacity:0.7;margin-bottom:4px;">${formatDate(t.date)}</div>
          <div style="font-weight:700;">${t.name}</div>
          <div style="color:${t.type === 'expense' ? '#EF4444' : '#10B981'};font-weight:800;">
            ${t.type === 'expense' ? '💸 ' : '💰 '}${formatCurrency(t.amount)}
          </div>
          ${t.notes ? `<div style="font-size:0.75rem;opacity:0.6;margin-top:4px;">${t.notes}</div>` : ''}
        </div>
      </div>
    `).join('');
  }
  
  return `
    <div class="page active" id="page-timeline">
      <h1>🚀 رحلة المؤسس</h1>
      <div class="timeline-line">
        ${timelineHTML}
      </div>
    </div>
  `;
}

function renderSettingsPage() {
  return `
    <div class="page active" id="page-settings">
      <h1>⚙️ الإعدادات</h1>
      
      <button class="btn-ghost card" id="btn-theme">
        <span style="font-size:1.3rem;">${darkMode ? '☀️' : '🌙'}</span>
        <span>التبديل إلى الوضع ${darkMode ? 'الفاتح' : 'الداكن'}</span>
      </button>
      
      <button class="btn-ghost card" id="btn-demo">
        <span style="font-size:1.3rem;">📦</span>
        <span>تحميل بيانات تجريبية</span>
      </button>
      
      <button class="btn-ghost card" id="btn-export">
        <span style="font-size:1.3rem;">📥</span>
        <span>تصدير نسخة احتياطية (JSON)</span>
      </button>
      
      <button class="btn-ghost card" id="btn-import-trigger">
        <span style="font-size:1.3rem;">📤</span>
        <span>استيراد نسخة احتياطية</span>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none;" />
      
      <div class="card" style="margin-top:8px;">
        <p style="font-size:0.75rem;opacity:0.6;">💰 العملة: <strong>جنيه مصري (ج.م)</strong></p>
        <p style="font-size:0.75rem;opacity:0.6;">📊 عدد المعاملات: <strong>${transactions.length}</strong></p>
        <p style="font-size:0.75rem;opacity:0.6;">🕐 آخر تحديث: <strong>${getRelativeTime(new Date().toISOString())}</strong></p>
      </div>
      
      <button class="btn-ghost card btn-danger" id="btn-clear" style="margin-top:12px;">
        <span style="font-size:1.3rem;">⚠️</span>
        <span>حذف جميع البيانات</span>
      </button>
      
      <div style="text-align:center;margin-top:20px;opacity:0.4;font-size:0.7rem;">
        <p>🏢 Market Systems Investment Tracker</p>
        <p>🇪🇬 Made in Egypt · بالجنيه المصري</p>
      </div>
    </div>
  `;
}

function renderBottomNav() {
  const items = [
    { id: 'dashboard', icon: '📊', label: 'الرئيسية' },
    { id: 'transactions', icon: '💳', label: 'المعاملات' },
    { id: 'timeline', icon: '⏳', label: 'الرحلة' },
    { id: 'settings', icon: '⚙️', label: 'الإعدادات' },
  ];
  
  return `
    <div class="bottom-nav">
      ${items.map(item => `
        <button class="nav-btn ${currentPage === item.id ? 'active' : ''}" data-nav="${item.id}">
          <span class="nav-icon">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function renderFAB() {
  return `<button class="fab" id="fab-add">＋</button>`;
}

function renderAddModal() {
  const categories = getCategories();
  const today = new Date().toISOString().slice(0,10);
  
  return `
    <div class="modal-overlay" id="add-modal">
      <div class="modal-content" id="modal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <h2>➕ معاملة جديدة</h2>
          <button id="modal-close" style="background:none;color:#fff;font-size:1.5rem;padding:8px;">✕</button>
        </div>
        
        <div style="display:flex;gap:10px;margin-bottom:16px;">
          <button id="type-expense" class="btn-primary" style="background:#EF4444;flex:1;font-size:0.9rem;">📉 مصروف</button>
          <button id="type-revenue" style="background:#1A1A1C;color:#aaa;flex:1;padding:12px;border-radius:14px;font-weight:700;font-size:0.9rem;">📈 إيراد</button>
        </div>
        
        <input id="input-name" placeholder="الاسم *" autocomplete="off" />
        <input id="input-amount" type="number" placeholder="المبلغ بالجنيه المصري *" step="1" min="1" />
        
        <select id="input-category">
          ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        
        <select id="input-payment">
          <option>فيزا / كريدت كارد</option>
          <option>كاش</option>
          <option>تحويل بنكي</option>
          <option>فودافون كاش</option>
          <option>إنستاباي</option>
          <option>محفظة إلكترونية</option>
        </select>
        
        <input id="input-date" type="date" value="${today}" />
        <input id="input-notes" placeholder="ملاحظات (اختياري)" style="margin-bottom:20px;" />
        
        <button id="btn-save" class="btn-primary" style="background:#3B82F6;">💾 حفظ المعاملة</button>
      </div>
    </div>
  `;
}

// ========== EVENT BINDING ==========
function bindEvents() {
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      navigateTo(e.currentTarget.dataset.nav);
    });
  });
  
  // FAB
  const fab = document.getElementById('fab-add');
  if (fab) {
    fab.addEventListener('click', openAddModal);
  }
  
  // Search
  const searchInput = document.getElementById('search-tx');
  if (searchInput) {
    searchInput.addEventListener('input', handleSearch);
  }
  
  // Delete buttons
  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      if (confirm('❓ هل تريد حذف هذه المعاملة؟')) {
        deleteTransaction(id);
      }
    });
  });
  
  // Settings buttons
  const btnTheme = document.getElementById('btn-theme');
  if (btnTheme) btnTheme.addEventListener('click', toggleTheme);
  
  const btnDemo = document.getElementById('btn-demo');
  if (btnDemo) btnDemo.addEventListener('click', loadDemoData);
  
  const btnExport = document.getElementById('btn-export');
  if (btnExport) btnExport.addEventListener('click', exportData);
  
  const btnImport = document.getElementById('btn-import-trigger');
  const importFile = document.getElementById('import-file');
  if (btnImport && importFile) {
    btnImport.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', handleFileImport);
  }
  
  const btnClear = document.getElementById('btn-clear');
  if (btnClear) btnClear.addEventListener('click', clearAllData);
}

function openAddModal() {
  const root = document.getElementById('app-root');
  const modalHTML = renderAddModal();
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = modalHTML;
  const modalElement = tempDiv.firstElementChild;
  
  root.appendChild(modalElement);
  
  let currentType = 'expense';
  
  // Type toggle
  document.getElementById('type-expense').addEventListener('click', function() {
    currentType = 'expense';
    this.style.background = '#EF4444';
    this.style.color = '#fff';
    const revBtn = document.getElementById('type-revenue');
    revBtn.style.background = '#1A1A1C';
    revBtn.style.color = '#aaa';
    document.getElementById('input-category').style.display = 'block';
    document.getElementById('input-payment').style.display = 'block';
  });
  
  document.getElementById('type-revenue').addEventListener('click', function() {
    currentType = 'revenue';
    this.style.background = '#10B981';
    this.style.color = '#fff';
    const expBtn = document.getElementById('type-expense');
    expBtn.style.background = '#1A1A1C';
    expBtn.style.color = '#aaa';
    document.getElementById('input-category').style.display = 'none';
    document.getElementById('input-payment').style.display = 'none';
  });
  
  // Close
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('add-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  
  // Save
  document.getElementById('btn-save').addEventListener('click', function() {
    const name = document.getElementById('input-name').value.trim();
    const amountStr = document.getElementById('input-amount').value;
    const amount = parseFloat(amountStr);
    
    if (!name) {
      alert('⚠️ الرجاء إدخال اسم المعاملة');
      return;
    }
    if (isNaN(amount) || amount <= 0) {
      alert('⚠️ الرجاء إدخال مبلغ صحيح');
      return;
    }
    
    const data = {
      type: currentType,
      name,
      amount,
      category: currentType === 'expense' ? document.getElementById('input-category').value : undefined,
      paymentMethod: currentType === 'expense' ? document.getElementById('input-payment').value : undefined,
      client: currentType === 'revenue' ? 'عميل' : undefined,
      date: document.getElementById('input-date').value,
      notes: document.getElementById('input-notes').value,
    };
    
    addTransaction(data);
    closeModal();
  });
}

function closeModal() {
  const modal = document.getElementById('add-modal');
  if (modal) modal.remove();
}

function handleSearch(e) {
  const searchTerm = e.target.value.trim();
  const rows = document.querySelectorAll('#tx-list .card');
  rows.forEach(row => {
    const text = row.textContent.replace(/\s+/g, ' ');
    row.style.display = searchTerm === '' || text.includes(searchTerm) ? '' : 'none';
  });
}

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = JSON.parse(evt.target.result);
      importData(data);
    } catch(err) {
      alert('❌ ملف النسخة الاحتياطية غير صالح');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ========== PWA Service Worker ==========
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'ms-tracker-egp-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          return cached || fetch(e.request).then(response => {
            if (response.status === 200) {
              const clone = response.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
            }
            return response;
          });
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ========== START APP ==========
document.addEventListener('DOMContentLoaded', init);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  init();
}
</script>
</body>
</html>
